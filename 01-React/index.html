        Q: the Question arrive how does this project understand what is innerHTML, what is getElementById? what is createElement? how does browser understand what are these

        So, what we have to do is first get React into our project
        1st way: through CDN React

        H.W: What is CDN
        => CDN is content delivery network these are the webSites where this React has been hosted and we are just pulling react from there into our project
        => Basically CDN is the place where this React Library is hosted and we are just fetching the react putting it into our code using CDN link

        => A CDN host React's file on distributed servers worldwide, and by linking to it into our HTML, we're just pulling the library directly into our project without downloading or hosting it ourself
        */

    <!-- 
    2. H.W: What is crosseOrigin 
    =>The crossorigin attribute on a <script> tag enables Cross-Origin Resource Sharing (CORS) for loading scripts from external domains like CDNs, controlling how the browser handles credentials and error reporting.

    # crossorigin Purpose
    => It tells the browser to fetch the script (e.g., React from unpkg.com) as a cross-origin request without sending user cookies or auth data when set to "anonymous".
    This is required for public CDN scripts to avoid security blocks, ensure proper caching, and expose detailed JavaScript errors (instead of generic 
    "Script error") if something fails.
